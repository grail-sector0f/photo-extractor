<!DOCTYPE html>
<html>
<head>
  <title>Generate Promo Tile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; padding: 24px; background: #f5f5f5; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #111; }
    canvas { display: block; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
    button { display: block; margin-top: 12px; padding: 8px 20px; font-family: Inter, sans-serif;
             font-size: 14px; font-weight: 500; background: #2563EB; color: #fff;
             border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
<h1>Promotional Tile Generator (440×280)</h1>
<canvas id="tile" width="440" height="280"></canvas>
<button id="download">Download promo-tile-440x280.png</button>
<script>
// Wait for Inter to load before drawing so text renders with the correct font
document.fonts.ready.then(() => {
  const canvas = document.getElementById('tile');
  const ctx = canvas.getContext('2d');
  const W = 440, H = 280;

  // Blue background
  ctx.fillStyle = '#2563EB';
  ctx.fillRect(0, 0, W, H);

  // Subtle gradient overlay — adds depth without looking retro
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(255,255,255,0.08)');
  grad.addColorStop(1, 'rgba(0,0,0,0.12)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Camera icon centered, ~80px tall
  const iconSize = 80;
  const ix = (W - iconSize) / 2;
  const iy = 44;

  function drawCameraIcon(ctx, x, y, size) {
    const s = size;
    // Camera body (white rounded rect)
    ctx.fillStyle = '#FFFFFF';
    const bw = s * 0.62;
    const bh = s * 0.42;
    const bx = x + (s - bw) / 2;
    const by = y + s * 0.34;
    const br = Math.round(s * 0.10);
    ctx.beginPath();
    ctx.moveTo(bx + br, by);
    ctx.lineTo(bx + bw - br, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + br);
    ctx.lineTo(bx + bw, by + bh - br);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - br, by + bh);
    ctx.lineTo(bx + br, by + bh);
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - br);
    ctx.lineTo(bx, by + br);
    ctx.quadraticCurveTo(bx, by, bx + br, by);
    ctx.closePath();
    ctx.fill();

    // Viewfinder bump
    const vw = s * 0.22;
    const vh = s * 0.10;
    const vx = x + (s - vw) / 2;
    const vy = by - vh + 1;
    ctx.fillRect(Math.round(vx), Math.round(vy), Math.round(vw), Math.round(vh + 1));

    // Lens (blue circle)
    ctx.fillStyle = '#2563EB';
    const lensR = s * 0.13;
    const lensX = x + s / 2;
    const lensY = by + bh / 2 + s * 0.02;
    ctx.beginPath();
    ctx.arc(lensX, lensY, lensR, 0, Math.PI * 2);
    ctx.fill();

    // Lens highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(lensX - lensR * 0.3, lensY - lensR * 0.3, lensR * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }

  drawCameraIcon(ctx, ix, iy, iconSize);

  // Extension name — Inter SemiBold, clean and modern
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '600 30px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('Photo Extractor', W / 2, iy + iconSize + 44);

  // Tagline — Inter Regular, slightly muted
  ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
  ctx.font = '400 14px Inter, sans-serif';
  ctx.letterSpacing = '0.02em';
  ctx.fillText('Save photos with structured names', W / 2, iy + iconSize + 70);

  document.getElementById('download').onclick = () => {
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'promo-tile-440x280.png';
      a.click();
    });
  };
});
</script>
</body>
</html>
